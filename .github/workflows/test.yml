on:
  - push

name: Test

env:
  GOTOOLCHAIN: local

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - run: go mod download
      - run: go mod verify
      - run: go test -v -count=1 -race ./...

  unit-dockertestx:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dockertestx
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - run: go mod download
      - run: go mod verify
      - run: go test -v -count=1 -race ./...

  unit-bunx:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bunx
    strategy:
      matrix:
        go:
          - "1.25"
          - "1.26"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go }}
      - run: go mod download
      - run: go mod verify
      - run: go test -v -count=1 -race ./...

  fix-bunx-go-sum:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit-bunx]
    # This job runs only when:
    # 1. unit-bunx has failed (likely due to stale go.sum in bunx/)
    # 2. The workflow was triggered by Dependabot
    #
    # Background: bunx depends on dockertestx via a local replace directive in go.mod.
    # When Dependabot bumps dependencies in dockertestx/go.mod, dockertestx/go.sum is
    # updated but bunx/go.sum is left stale — it lacks the hash entries for the newly
    # introduced transitive dependencies. This causes the bunx build to fail with
    # "missing go.sum entry" errors.
    #
    # This job automatically runs `go mod tidy` in bunx/ and pushes the updated
    # go.sum back to the Dependabot PR branch so that subsequent CI runs pass.
    #
    # A GitHub App token is used for the push because pushes made with the default
    # GITHUB_TOKEN do not trigger new workflow runs (a GitHub safeguard against
    # infinite loops). The App token makes the push appear as a regular user push,
    # which re-runs Test and Lint against the fixed commit.
    if: failure() && github.actor == 'dependabot[bot]' && github.run_attempt == 1
    permissions:
      contents: read
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.DEPENDABOT_FIX_APP_ID }}
          private-key: ${{ secrets.DEPENDABOT_FIX_PRIVATE_KEY }}

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: bunx/go.mod

      - name: Run go mod tidy in bunx
        working-directory: bunx
        run: go mod tidy

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bunx/go.mod bunx/go.sum
          if ! git diff --staged --quiet; then
            git commit -m "chore(bunx): go mod tidy after dockertestx dependency update"
            git push
          fi
